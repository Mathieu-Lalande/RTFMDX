  <rect x="590" y="108" width="100" height="100" rx="22" fill="#161b27" stroke="#2a3347" stroke-width="1.5"/>
  <rect x="590" y="108" width="100" height="100" rx="22" fill="#6366f1" opacity="0.1"/>
  <text x="640" y="176" font-family="'Segoe UI', system-ui, sans-serif" font-size="48" font-weight="800" fill="#6366f1" text-anchor="middle">M</text>

  <!-- Title -->
  <text x="640" y="252" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="60" font-weight="700" fill="#e8eaf0" text-anchor="middle" letter-spacing="-1.5">MXT Viewer</text>

  <!-- Subtitle -->
  <text x="640" y="292" font-family="'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="400" fill="#8892a4" text-anchor="middle" letter-spacing="0.3">Native Windows editor for Markdown &amp; extended MDX</text>

  <!-- Badges -->
  <g transform="translate(433, 320)">
    <rect width="102" height="26" rx="13" fill="#47848F" fill-opacity="0.2" stroke="#47848F" stroke-width="1" stroke-opacity="0.4"/>
    <text x="51" y="17" font-family="'Segoe UI', system-ui, sans-serif" font-size="11" font-weight="500" fill="#7ec8cf" text-anchor="middle">Electron 33</text>
