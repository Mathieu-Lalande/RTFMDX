    <rect x="1016" y="115" width="110" height="12" rx="3" fill="#e8eaf0" opacity="0.8"/>
    <rect x="1016" y="137" width="75" height="6" rx="3" fill="#4a5568" opacity="0.8"/>
    <rect x="1016" y="153" width="185" height="6" rx="3" fill="#4a5568" opacity="0.5"/>
