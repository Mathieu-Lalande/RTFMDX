<svg width="1280" height="400" viewBox="0 0 1280 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="400" fill="#0f1117"/>

  <!-- Grid -->
  <g opacity="0.035" stroke="#6366f1" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="960" y1="0" x2="960" y2="400"/>
    <line x1="1120" y1="0" x2="1120" y2="400"/>
  </g>

  <!-- Glow blobs -->
  <ellipse cx="300" cy="200" rx="350" ry="220" fill="url(#glow1)"/>
  <ellipse cx="980" cy="200" rx="300" ry="200" fill="url(#glow2)"/>
  <ellipse cx="640" cy="400" rx="420" ry="130" fill="#6366f1" opacity="0.07"/>

  <!-- Left decorative code editor -->
  <g opacity="0.2">
    <rect x="52" y="110" width="230" height="175" rx="10" fill="#161b27" stroke="#2a3347" stroke-width="1"/>
    <circle cx="76" cy="133" r="5" fill="#ef4444"/>
    <circle cx="93" cy="133" r="5" fill="#f59e0b"/>
    <circle cx="110" cy="133" r="5" fill="#10b981"/>
