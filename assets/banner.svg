    <rect x="1024" y="197" width="90" height="6" rx="3" fill="#818cf8" opacity="0.7"/>
    <rect x="1024" y="213" width="140" height="6" rx="3" fill="#4a5568" opacity="0.5"/>
    <!-- Steps -->
    <circle cx="1024" cy="249" r="5" fill="#6366f1" opacity="0.6"/>
    <rect x="1036" y="246" width="100" height="6" rx="3" fill="#4a5568" opacity="0.6"/>
    <circle cx="1024" cy="268" r="5" fill="#6366f1" opacity="0.4"/>
    <rect x="1036" y="265" width="130" height="6" rx="3" fill="#4a5568" opacity="0.4"/>
    <circle cx="1024" cy="287" r="5" fill="#6366f1" opacity="0.3"/>
    <rect x="1036" y="284" width="80" height="6" rx="3" fill="#4a5568" opacity="0.3"/>
