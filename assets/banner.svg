    <rect x="70" y="163" width="55" height="6" rx="3" fill="#6366f1" opacity="0.9"/>
    <rect x="133" y="163" width="35" height="6" rx="3" fill="#818cf8" opacity="0.5"/>
    <rect x="70" y="179" width="28" height="6" rx="3" fill="#10b981" opacity="0.7"/>
    <rect x="106" y="179" width="65" height="6" rx="3" fill="#4a5568" opacity="0.9"/>
    <rect x="70" y="195" width="45" height="6" rx="3" fill="#6366f1" opacity="0.5"/>
    <rect x="123" y="195" width="80" height="6" rx="3" fill="#4a5568" opacity="0.6"/>
    <rect x="70" y="211" width="85" height="6" rx="3" fill="#4a5568" opacity="0.5"/>
    <rect x="70" y="227" width="40" height="6" rx="3" fill="#f59e0b" opacity="0.6"/>
    <rect x="118" y="227" width="60" height="6" rx="3" fill="#4a5568" opacity="0.4"/>
    <rect x="70" y="243" width="70" height="6" rx="3" fill="#818cf8" opacity="0.4"/>
    <rect x="70" y="259" width="50" height="6" rx="3" fill="#10b981" opacity="0.4"/>
  </g>

